<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>九宮奇門</title>
  <meta name="description" content="想一件事，選一個數字，以時家奇門置閏轉盤查看分數、吉凶與完整九宮。">
  <meta name="theme-color" content="#f6f1e7">
  <link rel="icon" href="data:,">
  <link rel="manifest" href="manifest.webmanifest?v=5.5-shijia-3">
  <link rel="stylesheet" href="style.css?v=5.5-shijia-3">
</head>
<body>
  <main class="mobile-prototype">
    <section class="simple-screen simple-ask active" id="simpleAskView" aria-labelledby="askTitle">
      <header class="ask-header">
        <p class="eyebrow">大道至簡</p>
        <h1 id="askTitle">九宮奇門</h1>
        <p>想一件具體的事，憑直覺選一個數字。</p>
      </header>

      <div class="simple-form">
        <label class="field-label" for="questionText">想問的事情</label>
        <textarea id="questionText" rows="2" placeholder="例如：這次合作適合現在推進嗎？" autocomplete="off"></textarea>

        <label class="field-label" for="qtype">問事類型</label>
        <select id="qtype">
          <option>今日運勢</option>
          <option>工作</option>
          <option>財運</option>
          <option>感情</option>
          <option>合作</option>
          <option>健康</option>
          <option>風水</option>
          <option selected>決策</option>
        </select>

        <div class="number-heading">
          <span class="field-label">選一個數字</span>
          <span>1–9</span>
        </div>
        <div class="num-pad" id="numPad" aria-label="選擇一到九的數字"></div>

        <details class="time-adjust">
          <summary>台北時間：<span id="timeSummary">現在</span><span aria-hidden="true">（修改）</span></summary>
          <label class="sr-only" for="dt">起盤時間</label>
          <input type="datetime-local" id="dt" min="1900-01-31T00:00" max="2050-12-31T23:59">
        </details>

        <p class="form-error" id="simpleFormError" role="alert"></p>
        <button class="primary-button" id="buildBtn" type="button">算分數與吉凶</button>
      </div>

      <p class="rule-note">時家奇門・置閏・轉盤；分數只看鎖定宮。</p>
    </section>

    <section class="simple-screen simple-result" id="simpleResultView" aria-labelledby="resultTitle" hidden>
      <header class="result-header">
        <p class="brand" id="resultTitle">九宮奇門</p>
        <h2 id="resultQuestion">—</h2>
        <p class="result-context" id="resultContext">—</p>
      </header>

      <div class="score-orbit" role="status" aria-live="polite" aria-atomic="true" aria-label="分數">
        <strong id="resultScore">—</strong>
        <span>/ 100</span>
      </div>

      <p class="result-verdict" id="resultVerdict">—</p>
      <div class="result-divider" aria-hidden="true"></div>
      <p class="result-message" id="resultMessage">—</p>
      <p class="result-safety" id="resultSafety" hidden></p>

      <div class="result-actions">
        <button class="secondary-button" id="openChartBtn" type="button">查看完整盤面</button>
        <button class="primary-button" id="resetBtn" type="button">再算一次</button>
        <p class="rule-note">同一時間與報數，盤面和分數固定不變。</p>
      </div>
    </section>

    <section class="simple-screen chart-screen" id="simpleChartView" aria-labelledby="chartTitle" hidden>
      <div class="chart-toolbar">
        <button class="back-button" id="backToResultBtn" type="button">← 返回結果</button>
        <span>時家奇門・置閏・轉盤</span>
      </div>

      <header class="chart-header">
        <p class="eyebrow">九宮總覽</p>
        <h2 id="chartTitle">完整盤面</h2>
        <p id="chartMetaPrimary">—</p>
      </header>

      <dl class="chart-meta-list" id="chartMetaList"></dl>
      <p class="chart-lock" id="chartLock">—</p>

      <div class="chart-stem-key" aria-label="十天干與天地盤干圖例">
        <span>十天干</span>
        <strong>甲 乙 丙 丁 戊 己 庚 辛 壬 癸</strong>
        <small>宮格內：天＝天盤干・地＝地盤干</small>
      </div>

      <div class="simple-chart-grid" id="simplePalaceGrid" aria-label="九宮完整盤面"></div>

      <section class="palace-detail" id="palaceDetail" aria-live="polite" tabindex="-1"></section>

      <p class="chart-caveat">採台北時間、子正換日、超接置閏九日門檻、天禽寄坤。若時間正落在交節同一分鐘，建議另盤核對。</p>
      <button class="secondary-button chart-bottom-back" id="chartBackBottomBtn" type="button">返回結果</button>
    </section>

    <div class="engine-controls" hidden aria-hidden="true">
      <input id="inquiryMode" value="formal">
      <input id="selectionMode" value="single">
      <select id="doorMode"><option value="zhirun-zhuanpan" selected>置閏轉盤</option></select>
      <select id="ziChange"><option value="false" selected>00:00 換日</option></select>
      <div id="autoNote"></div>
    </div>
  </main>

  <script src="engine.js?v=5.5-shijia-3" defer></script>
  <script src="timeqimen-engine.js?v=5.5-shijia-3" defer></script>
  <script src="app.js?v=5.5-shijia-3" defer></script>
</body>
</html>
