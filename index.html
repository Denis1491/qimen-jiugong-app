<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>九宮奇門鎖單宮</title>
  <meta name="description" content="九宮奇門鎖單宮：輸入時間、選 1-9 一個數字，查看九宮盤與鎖單宮結果。">
  <meta name="theme-color" content="#a94321">
  <link rel="manifest" href="manifest.webmanifest">
  <link rel="stylesheet" href="style.css">
</head>
<body>
<div class="shell">
  <header class="hero">
    <div class="hero-main card">
      <h1>九宮奇門鎖單宮</h1>
      <div class="btn-row">
        <button class="btn btn-soft" id="quickNow">使用現在時間</button>
        <button class="btn btn-ghost" id="quickExample">範例</button>
      </div>
    </div>
    <aside class="hero-side card">
      <div class="metric"><div class="label">鎖定</div><div class="value" id="metricLock">未選數</div></div>
      <div class="metric"><div class="label">分數</div><div class="value" id="metricScore">—</div></div>
      <div class="metric"><div class="label">全盤</div><div class="value" id="metricOverall">—</div></div>
      <div class="metric metric-wide"><div class="label">規則</div><div class="value" id="metricRules">V4.3</div></div>
    </aside>
  </header>

  <section class="panel card controls">
    <div class="section-title">
      <div><h2>起盤</h2></div>
    </div>
    <div class="form-grid primary-form">
      <div class="field"><label for="dt">起盤時間</label><input type="datetime-local" id="dt"></div>
      <div class="field"><label for="qtype">用途</label><select id="qtype"><option>今日運勢</option><option>工作</option><option>財運</option><option>感情</option><option>合作</option><option>健康</option><option>風水</option><option>決策</option></select></div>
      <div class="action-field"><div class="btn-row"><button class="btn btn-primary" id="buildBtn">開始排盤</button></div></div>
    </div>
    <details class="advanced">
      <summary>進階設定</summary>
      <div class="advanced-grid">
        <div class="field"><label for="doorMode">八門排法</label><select id="doorMode"><option value="lock">九宮鎖單宮校準</option><option value="star">星門同轉</option><option value="classic">傳統值使門</option></select></div>
        <div class="field"><label for="ziChange">晚子時</label><select id="ziChange"><option value="false">23:00 不換日</option><option value="true">23:00 換隔日</option></select></div>
        <div class="action-field"><div class="btn-row"><button class="btn btn-ghost" id="printBtn">列印/PDF</button></div></div>
      </div>
    </details>
    <div class="note" id="autoNote">尚未排盤。</div>
  </section>

  <section class="panel card controls">
<div class="section-title"><div><h2>選數字</h2><small>選 1-9 即可。</small></div></div>
    <div class="num-pad" id="numPad"></div>
    <div class="locked-palace-panel" id="lockedPalacePanel">
      <div class="locked-empty">請先起盤，再選一個數字。</div>
    </div>
  </section>

  <main class="app-main">
    <section class="chart-card card">
      <div class="section-title"><div><h2>九宮盤面</h2><small>點宮位也可查看。</small></div><span class="score-pill score-mid" id="chartBadge">未排盤</span></div>
      <div class="meta-grid" id="metaGrid"></div>
      <div class="palace-frame"><div class="palace-grid" id="palaceGrid"></div></div>
    </section>

    <aside class="result-card card">
      <div class="section-title"><div><h2>結果</h2><small id="resultSub">尚未選數</small></div></div>
      <div class="result-headline" id="resultHeadline">先起盤並選數。</div>
      <div class="big-score"><span class="num" id="scoreNum">—</span><span class="suffix">/100</span></div>
      <div class="grade" id="gradeText">未鎖定</div>
      <div class="bar"><span id="scoreBar"></span></div>
      <div class="tabs" id="reasonTabs"></div>
      <div class="list" id="resultList"></div>
      <hr style="border:0;border-top:1px solid #e4d2bd;margin:16px 0">
      <div class="btn-row">
        <button class="btn btn-teal" id="copyReport">複製報告</button>
        <button class="btn btn-soft" id="downloadTxt">下載文字</button>
        <button class="btn btn-ghost" id="exportJson">匯出盤面 JSON</button>
        <button class="btn btn-ghost" id="importJsonBtn">匯入 JSON</button>
        <input type="file" id="importJsonInput" accept="application/json,.json" hidden>
      </div>
    </aside>
  </main>

  <section class="panel card" style="margin-top:18px">
    <div class="section-title">
      <div><h2>報告</h2><small>可切換閱讀深度。</small></div>
      <div class="report-tools">
        <button class="report-mode active" type="button" data-report-mode="simple">簡明</button>
        <button class="report-mode" type="button" data-report-mode="detail">詳細</button>
      </div>
    </div>
    <div class="report" id="reportBox">尚未產生報告。</div>
  </section>

  <section class="panel card" style="margin-top:18px">
    <div class="section-title">
      <div><h2>案例庫</h2><small>儲存、回看、校盤。</small></div>
      <div class="btn-row">
        <button class="btn btn-primary" id="saveCase">儲存本次</button>
        <button class="btn btn-soft" id="exportCases">匯出案例</button>
        <button class="btn btn-ghost" id="clearCases">清空</button>
      </div>
    </div>
    <div class="case-grid">
      <div class="field"><label for="caseTitle">案例名稱</label><input id="caseTitle" placeholder="例如：工作面談"></div>
      <div class="field"><label for="caseOutcome">實際結果</label><input id="caseOutcome" placeholder="事後補填，方便校盤"></div>
      <div class="field"><label for="caseSearch">搜尋</label><input id="caseSearch" placeholder="搜尋名稱、用途、宮位、結果"></div>
    </div>
    <div class="case-list" id="caseList"></div>
  </section>
</div>
<script src="engine.js" defer></script>
<script src="app.js" defer></script>
</body>
</html>
