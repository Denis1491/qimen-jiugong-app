<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>九宮奇門</title>
  <meta name="description" content="想一件事，選一個數字，查看目前規則下的分數與吉凶傾向。">
  <meta name="theme-color" content="#f6f1e7">
  <link rel="icon" href="data:,">
  <link rel="manifest" href="manifest.webmanifest?v=5.4-simple-result-first-4">
  <link rel="stylesheet" href="style.css?v=5.4-simple-result-first-4">
</head>
<body>
  <main class="mobile-prototype" aria-live="polite">
    <section class="simple-screen simple-ask active" id="simpleAskView" aria-labelledby="askTitle">
      <header class="ask-header">
        <p class="eyebrow">大道至簡</p>
        <h1 id="askTitle">九宮奇門</h1>
        <p>想一件具體的事，憑直覺選一個數字。</p>
      </header>

      <div class="simple-form">
        <label class="field-label" for="questionText">想問的事情</label>
        <textarea id="questionText" rows="2" placeholder="例如：這次合作適合現在推進嗎？" autocomplete="off"></textarea>

        <label class="field-label" for="qtype">問事類型</label>
        <select id="qtype">
          <option>今日運勢</option>
          <option>工作</option>
          <option>財運</option>
          <option>感情</option>
          <option>合作</option>
          <option>健康</option>
          <option>風水</option>
          <option selected>決策</option>
        </select>

        <div class="number-heading">
          <span class="field-label">選一個數字</span>
          <span>1–9</span>
        </div>
        <div class="num-pad" id="numPad" aria-label="選擇一到九的數字"></div>

        <details class="time-adjust">
          <summary>時間：<span id="timeSummary">現在</span><span aria-hidden="true">（修改）</span></summary>
          <label class="sr-only" for="dt">起盤時間</label>
          <input type="datetime-local" id="dt">
        </details>

        <p class="form-error" id="simpleFormError" role="alert"></p>
        <button class="primary-button" id="buildBtn" type="button">算分數與吉凶</button>
      </div>

      <p class="rule-note">術法規則待校準，分數僅表示目前規則下的傾向。</p>
    </section>

    <section class="simple-screen simple-result" id="simpleResultView" aria-labelledby="resultTitle" hidden>
      <header class="result-header">
        <p class="brand" id="resultTitle">九宮奇門</p>
        <h2 id="resultQuestion">—</h2>
        <p class="result-context" id="resultContext">—</p>
      </header>

      <div class="score-orbit" aria-label="分數">
        <strong id="resultScore">—</strong>
        <span>/ 100</span>
      </div>

      <p class="result-verdict" id="resultVerdict">—</p>
      <div class="result-divider" aria-hidden="true"></div>
      <p class="result-message" id="resultMessage">—</p>
      <p class="result-safety" id="resultSafety" hidden></p>

      <div class="result-actions">
        <button class="primary-button" id="resetBtn" type="button">再算一次</button>
        <p class="rule-note">術法規則待校準，分數僅表示目前規則下的傾向。</p>
      </div>
    </section>

    <div class="engine-controls" hidden aria-hidden="true">
      <input id="inquiryMode" value="formal">
      <input id="selectionMode" value="single">
      <select id="doorMode"><option value="lock" selected>九宮鎖單宮校準</option></select>
      <select id="ziChange"><option value="false" selected>23:00 不換日</option></select>
      <div id="autoNote"></div>
    </div>
  </main>

  <script src="engine.js?v=5.4-simple-result-first-4" defer></script>
  <script src="app.js?v=5.4-simple-result-first-4" defer></script>
</body>
</html>
